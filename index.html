<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>乌萨奇伪人制裁系统 💩</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;height:100vh;overflow:hidden;
  background:#FFF0F8;user-select:none;-webkit-tap-highlight-color:transparent}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;transition:opacity .3s}
.screen.hidden{opacity:0;pointer-events:none}
.stripe{height:22px;background:repeating-linear-gradient(-45deg,#ffd700 0,#ffd700 9px,#222 9px,#222 18px)}
/* 稀有度徽章 */
.badge-ur{background:linear-gradient(135deg,#FFD700,#FF8C00);animation:urGlow 1.5s ease-in-out infinite}
.badge-ssr{background:linear-gradient(135deg,#DA70D6,#7B2FBE);animation:ssrGlow 2s ease-in-out infinite}
.badge-sr{background:linear-gradient(135deg,#4169E1,#00CED1)}
.badge-r{background:linear-gradient(135deg,#888,#aaa)}
@keyframes urGlow{0%,100%{box-shadow:0 0 14px rgba(255,200,0,.8)}50%{box-shadow:0 0 28px gold}}
@keyframes ssrGlow{0%,100%{box-shadow:0 0 10px rgba(180,80,220,.6)}50%{box-shadow:0 0 22px rgba(200,100,255,.95)}}
/* 上传屏 */
#s-upload{background:linear-gradient(150deg,#FFF0F8,#EDE8FF)}
.up-card{background:#fff;border:3px solid #C8A0B8;border-radius:22px;padding:22px 20px;
  width:min(320px,92vw);box-shadow:5px 5px 0 #C8A0B8;display:flex;
  flex-direction:column;align-items:center;gap:12px}
#up-canvas{animation:wobble 1.8s ease-in-out infinite}
@keyframes zenFloat{0%,100%{transform:translateY(0) rotate(-.5deg)}50%{transform:translateY(-10px) rotate(.5deg)}}
@keyframes wobble{0%,100%{transform:rotate(-4deg) translateY(0)}50%{transform:rotate(4deg) translateY(-8px)}}
.up-bubble{background:#FFF3B0;border:2px solid #C8A0B8;border-radius:12px;
  padding:7px 14px;font-size:.78rem;font-weight:800;color:#4A3848;
  box-shadow:2px 2px 0 #C8A0B8;transform:rotate(-1deg);text-align:center}
.up-zone{width:100%;border:2.5px dashed #E8789A;border-radius:14px;padding:16px;
  text-align:center;cursor:pointer;background:#FFF8FA;position:relative;transition:all .18s}
.up-zone:hover{background:#F5EEFF;transform:scale(1.02)}
.up-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
/* 游戏屏 */
#s-game{padding:0;background:#FFF5FA}
.g-top{width:100%;padding:8px;background:#fff;border-bottom:2.5px solid #C8A0B8;
  text-align:center;font-size:.85rem;font-weight:900;color:#4A3848;flex-shrink:0}
.stage{flex:1;width:100%;position:relative;overflow:hidden}
#gc{position:absolute;inset:0;width:100%;height:100%}
.g-bottom{width:100%;padding:8px 14px 10px;background:#fff;border-top:2.5px solid #C8A0B8;flex-shrink:0}
.g-bar-row{display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;color:#4A3848;margin-bottom:4px}
.g-track{height:20px;background:#F5E0EA;border-radius:10px;border:2px solid #C8A0B8;overflow:hidden;position:relative}
.g-fill{height:100%;border-radius:10px;background:linear-gradient(90deg,#B8EFE4,#FFB3C6,#E8789A);
  background-size:200%;background-position:right;width:0%;transition:width .15s}
.g-fill-t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);pointer-events:none}
/* 数据条（报告用） */
.stat-row{display:flex;align-items:center;gap:8px;font-size:.76rem;margin-bottom:6px}
.stat-row:last-child{margin-bottom:0}
.stat-key{color:#8A7898;width:52px;font-weight:700;flex-shrink:0;font-size:.72rem}
.stat-track{flex:1;height:8px;background:#EDE0F0;border-radius:4px;overflow:hidden}
.stat-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#B8EFE4,#E8789A)}
.stat-val{font-weight:900;color:#4A3848;width:46px;text-align:right;font-size:.78rem}
/* 按钮 */
.btn-plain{flex:1;border:2px solid #C8A0B8;border-radius:12px;padding:10px;
  font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;
  background:#fff;color:#4A3848}
.btn-pink{flex:1;border:2px solid #E8789A;border-radius:12px;padding:10px;
  font-size:.8rem;font-weight:800;cursor:pointer;font-family:inherit;
  background:#E8789A;color:#fff}
/* 浮动文字 */
.mpop{position:fixed;font-weight:900;pointer-events:none;z-index:9999;animation:mpop 1.2s ease-out forwards}
@keyframes mpop{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-100px)}}
#flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:9999;transition:opacity .04s}
</style>
</head>
<body>
<div id="flash" style="background:#fff"></div>

<!-- ══ 上传 ══ -->
<div class="screen" id="s-upload" style="background:linear-gradient(160deg,#F0EEFF,#FFF0F8)">

  <!-- 打坐乌萨奇（首页 icon）-->
  <img id="home-usagi" width="160" height="160"
       style="object-fit:cover;border-radius:50%;margin-bottom:18px;
              box-shadow:0 8px 32px rgba(150,100,200,.2);
              animation:zenFloat 4s ease-in-out infinite">

  <!-- slogan：看起来很佛，实际很暴 -->
  <div style="font-size:1.6rem;font-weight:900;color:#4A3848;letter-spacing:2px;margin-bottom:6px">
    善哉善哉，功德无量。💩
  </div>
  <div style="font-size:.8rem;color:#9A80B8;margin-bottom:28px;font-style:italic">
    
  </div>

  <!-- 上传区 -->
  <div class="up-zone" id="up-zone"
       style="width:min(280px,88vw);background:#fff;border-radius:20px;
              border:2.5px dashed #C8A0E8;padding:20px 16px;text-align:center;
              cursor:pointer;position:relative;transition:all .18s;
              box-shadow:0 4px 16px rgba(150,100,200,.12)">
    <input type="file" id="file-inp" accept="image/*"
           style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">
    <div style="font-size:1.8rem;margin-bottom:6px">📱</div>
    <div style="font-size:.95rem;font-weight:800;color:#4A3848">上传伪人头像</div>
    <div style="font-size:.68rem;color:#B0909A;margin-top:4px">建议正脸照，效果更佳 😈</div>
  </div>

</div>


<!-- ══ 游戏 ══ -->
<div class="screen hidden" id="s-game">
  <div class="g-top">⚠️ 乌萨奇净化程序已激活 ⚠️</div>
  <div class="stage"><canvas id="gc"></canvas></div>
  <div class="g-bottom">
    <div class="g-bar-row">
      <span><span id="g-face">😌</span> 净化进度</span>
      <span style="color:#E8789A;font-weight:900"><span id="poop-n">0</span> / 15</span>
    </div>
    <div class="g-track">
      <div class="g-fill" id="g-fill"></div>
      <div class="g-fill-t" id="g-fill-t">点击便便开始制裁！</div>
    </div>
  </div>
</div>

<!-- ══ 报告 ══ -->
<div class="screen hidden" id="s-report"
     style="overflow-y:auto;justify-content:flex-start;padding:0;background:#EEE8FF">

  <!-- 顶部警示条 -->
  <div class="stripe"></div>

  <!-- 内容区 -->
  <div style="padding:14px 12px 0;display:flex;flex-direction:column;gap:10px;width:100%">

    <!-- ① HERO 卡：称号 + 角色图 + 金句 -->
    <div style="background:#fff;border-radius:20px;padding:20px 16px 16px;
         box-shadow:0 2px 14px rgba(100,60,200,.12);text-align:center">
      <div style="font-size:.6rem;color:#A090C0;letter-spacing:2px;margin-bottom:10px">
        你的精神状态类型：
      </div>
      <div id="rpt-rank"
           style="font-size:1.45rem;font-weight:900;color:#2A1A4A;
                  line-height:1.25;margin-bottom:8px;padding:0 6px">【称号】</div>
      <div id="rpt-tag"
           style="display:inline-block;font-size:.85rem;font-weight:900;
                  letter-spacing:5px;padding:5px 18px;border-radius:30px;
                  margin-bottom:14px;color:#fff;background:#888">USAGI</div>
      <!-- 角色图 + 稀有度 -->
      <div style="position:relative;display:inline-block;margin-bottom:14px">
        <img id="rpt-card-img" width="150" height="150"
             style="border-radius:20px;object-fit:cover;display:block;
                    box-shadow:0 6px 24px rgba(0,0,0,.15)">
        <div id="rpt-rarity-badge"
             style="position:absolute;top:-10px;right:-10px;font-size:.75rem;
                    font-weight:900;letter-spacing:2px;padding:4px 12px;
                    border-radius:20px;color:#fff">SSR</div>
      </div>
      <!-- 金句（乌萨奇图正下方） -->
      <div id="rpt-quote"
           style="font-size:.85rem;font-weight:700;color:#5A3868;line-height:1.7;
                  padding:10px 12px;background:#F5F0FF;border-radius:12px;
                  border-left:3px solid #C8A0E8;text-align:left"></div>
      <!-- tagline -->
      <div id="rpt-tagline"
           style="font-size:.72rem;color:#A090C0;font-style:italic;margin-top:10px">
        你的精神状态，已被本系统精准捕获
      </div>
    </div>

    <!-- ② 指标 pill + 评语 -->
    <div style="background:#fff;border-radius:16px;padding:14px 16px;
         box-shadow:0 2px 14px rgba(100,60,200,.12)">
      <div id="rpt-pill"
           style="display:inline-flex;align-items:center;gap:8px;
                  border-radius:30px;padding:7px 14px;margin-bottom:10px;
                  font-size:.76rem;font-weight:800">
        <span id="rpt-rarity-text">SR</span>
        <span style="opacity:.3">·</span>
        <span>耗时 <span id="rpt-time">-.-</span>s</span>
        <span style="opacity:.3">·</span>
        <span>怒气 <span id="rpt-rage-pill">---</span>%</span>
      </div>
      <div id="rpt-comment" style="font-size:.8rem;color:#4A3868;line-height:1.75">...</div>
    </div>

    <!-- ④ 数据条 -->
    <div style="background:#fff;border-radius:16px;padding:14px 16px;
         box-shadow:0 2px 14px rgba(100,60,200,.12)">
      <div style="font-size:.58rem;color:#A090B8;font-weight:800;letter-spacing:2px;margin-bottom:10px">本次制裁档案</div>
      <div class="stat-row">
        <span class="stat-key">净化值</span>
        <div class="stat-track"><div class="stat-fill" id="rpt-purity-bar" style="width:100%"></div></div>
        <span class="stat-val" id="rpt-purity-val">99.9%</span>
      </div>
      <div class="stat-row">
        <span class="stat-key">消耗便便</span>
        <div class="stat-track"><div class="stat-fill" style="width:100%"></div></div>
        <span class="stat-val">15 枚</span>
      </div>
      <div class="stat-row">
        <span class="stat-key">怒气值</span>
        <div class="stat-track"><div class="stat-fill" id="rpt-rage-bar" style="width:50%"></div></div>
        <span class="stat-val"><span id="rpt-rage-val">---</span>%</span>
      </div>
    </div>

    <!-- 按钮 -->
    <div style="display:flex;gap:8px">
      <button class="btn-plain" onclick="restart()">🔄 再来一次</button>
      <button class="btn-pink" onclick="shareRpt()">分享报告 📤</button>
    </div>

    <!-- 底部分享提示 -->
    <div style="text-align:center;font-size:.62rem;color:#A090C0;padding:4px 0 10px">
      📸 截图发给朋友，测测 ta 的职场战斗力
    </div>

  </div>

  <!-- 底部警示条 -->
  <div class="stripe"></div>

</div>

const SPRITES = {"worker": {"sx": 0, "sy": 0, "sw": 200, "sh": 395}, "punch": {"sx": 200, "sy": 0, "sw": 200, "sh": 395}, "crazy": {"sx": 600, "sy": 0, "sw": 200, "sh": 395}, "thumbsup": {"sx": 0, "sy": 395, "sw": 267, "sh": 405}, "super_": {"sx": 534, "sy": 395, "sw": 266, "sh": 405}};
const IMG={},OC={};
let loaded=0;
Object.entries(SRC).forEach(([k,src])=>{
  const i=new Image();
  i.onload=()=>{IMG[k]=i;loaded++;if(loaded===Object.keys(SRC).length)onReady();};
  i.onerror=()=>{loaded++;if(loaded===Object.keys(SRC).length)onReady();};
  i.src=src;
});
function rmWhite(src,br=240,sat=18){
  const oc=document.createElement('canvas');
  oc.width=src.width;oc.height=src.height;
  const c=oc.getContext('2d');c.drawImage(src,0,0);
  const id=c.getImageData(0,0,oc.width,oc.height),d=id.data;
  for(let i=0;i<d.length;i+=4){
    const mx=Math.max(d[i],d[i+1],d[i+2]),mn=Math.min(d[i],d[i+1],d[i+2]);
    if(mx>br&&mx-mn<sat)d[i+3]=0;
  }
  c.putImageData(id,0,0);return oc;
}
function cropSprite(sheet,{sx,sy,sw,sh}){
  const oc=document.createElement('canvas');oc.width=sw;oc.height=sh;
  oc.getContext('2d').drawImage(sheet,sx,sy,sw,sh,0,0,sw,sh);
  return rmWhite(oc);
}
function onReady(){
  if(IMG.sheet)Object.entries(SPRITES).forEach(([k,c])=>OC[k]=cropSprite(IMG.sheet,c));
  if(IMG.toilet)OC.toilet=rmWhite(IMG.toilet,220);
  if(IMG.midfinger)OC.midfinger=rmWhite(IMG.midfinger,230);
  if(IMG.poop)OC.poop=rmWhite(IMG.poop,230);
  // 首页打坐乌萨奇
  const hu=document.getElementById('home-usagi');
  if(hu&&IMG.card_ur3)hu.src=IMG.card_ur3.src;
  const uc=document.getElementById('up-canvas');
  if(uc&&OC.worker){const s=uc.getContext('2d'),sc=Math.min(96/OC.worker.width,110/OC.worker.height)*.9;
    s.drawImage(OC.worker,(96-OC.worker.width*sc)/2,(110-OC.worker.height*sc)/2,OC.worker.width*sc,OC.worker.height*sc);}
}

// ═══ 游戏 ═══
let canvas,ctx,W,H,UX,UY,UW,TX,TY,TR;
let phase='intro',tick=0,punchT=0,punchHit=false;
let canClick=false,poopVisible=false,gameDone=false;
let projectiles=[],particles=[],fxTexts=[],colShake=0,charProg=0;
const FACES=['😌','😤','🤬','💢','💥'];

function updateMeter(){
  const pct=poopCount/MAX*100;
  document.getElementById('g-fill').style.width=pct+'%';
  document.getElementById('poop-n').textContent=poopCount;
  document.getElementById('g-face').textContent=FACES[Math.min(Math.floor(poopCount/3),4)];
  document.getElementById('g-fill-t').textContent=
    poopCount===0?'点击便便开始制裁！':poopCount<MAX?`再来 ${MAX-poopCount} 坨！💪`:'引爆中 💥';
}
function startGame(){
  poopCount=0;clickTs=[];gameDone=false;charProg=0;colleagueImg=null;loadScreenshot();updateMeter();
  show('s-game');
  canvas=document.getElementById('gc');ctx=canvas.getContext('2d');
  const r=document.querySelector('.stage').getBoundingClientRect();
  W=canvas.width=r.width;H=canvas.height=r.height;
  UW=Math.min(W*.28,130);UX=W*.2;UY=H*.48;
  TR=Math.min(W*.22,95);TX=W*.73;TY=H*.44; // 圆形头像
  phase='squat';tick=0;canClick=false;poopVisible=false;
  projectiles=[];particles=[];fxTexts=[];colShake=0;
  const nc=canvas.cloneNode(true);canvas.parentNode.replaceChild(nc,canvas);
  canvas=nc;ctx=canvas.getContext('2d');
  canvas.addEventListener('click',onCanvasClick);
  canvas.addEventListener('touchstart',e=>{e.preventDefault();onCanvasClick(e.touches[0]);},{passive:false});
  cancelAnimationFrame(window._raf);
  window._raf=requestAnimationFrame(loop);
}
function onCanvasClick(e){
  if(!canClick||!poopVisible)return;
  const r=canvas.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  if(Math.hypot(mx-W*.48,my-H*.56)<72)throwPoop();
}
function throwPoop(){
  if(poopCount>=MAX)return;
  clickTs.push(Date.now());poopCount++;updateMeter();
  const sx=W*.48,sy=H*.56,cpX=(sx+TX)/2+(Math.random()-.5)*60,cpY=Math.min(sy,TY)-100-Math.random()*50;
  projectiles.push({sx,sy,cpX,cpY,tx:TX,ty:TY,t:0,spd:.032+Math.random()*.01,rot:0,rs:.2,done:false});
  if(poopCount>=MAX){canClick=false;poopVisible=false;setTimeout(explode,400);}
}
const bz=(p0,p1,p2,t)=>(1-t)**2*p0+2*(1-t)*t*p1+t**2*p2;
function explode(){
  phase='explode';tick=0;
  const fl=document.getElementById('flash');
  let fc=0;const fi=setInterval(()=>{
    fl.style.background=fc%2?'#ff6600':'#fff';fl.style.opacity=fc%2?'.5':'.9';
    fc++;if(fc>=8){clearInterval(fi);fl.style.opacity='0';fl.style.background='#fff';};
  },70);
  const cols=['#ff2200','#ff6600','#ffaa00','#ffee00','#fff','#ff9900'];
  for(let i=0;i<80;i++){
    const a=Math.PI*2*(i/80)+Math.random()*.5,spd=3+Math.random()*13;
    particles.push({x:TX,y:TY,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,
      alpha:1,sz:14+Math.random()*26,
      emoji:Math.random()<.45?['💥','🔥','💩','😂'][Math.floor(Math.random()*4)]:null,
      col:cols[Math.floor(Math.random()*cols.length)],
      rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.35,dec:.014});
  }
  fxTexts.push({x:TX,y:TY-80,t:0,dur:60,text:'BOOM！！！',col:'#ff2200',sz:52,bold:true});
}
function loop(){tick++;update();draw();if(!gameDone)window._raf=requestAnimationFrame(loop);}
function update(){
  if(phase==='squat'){
    if(tick===1)fxTexts.push({x:UX,y:UY-UW*.8,t:0,dur:70,text:'开始制裁！💩',col:'#E8789A',sz:16});
    if(tick>50){phase='game';tick=0;canClick=true;poopVisible=true;}
  }
  else if(phase==='explode'){
    charProg=Math.min(tick/60,1);colShake*=.8;
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.25;p.vx*=.97;p.alpha-=p.dec;p.rot+=p.rs;});
    particles=particles.filter(p=>p.alpha>0);
    if(tick>160&&!gameDone){gameDone=true;setTimeout(goReport,400);}
  }
  if(phase!=='explode')colShake*=.72;
  projectiles.forEach(p=>{
    if(p.done)return;p.t+=p.spd;p.rot+=p.rs;
    if(p.t>=1){p.done=true;colShake=Math.max(colShake,10);
      fxTexts.push({x:p.tx,y:p.ty-20,t:0,dur:18,text:'💦',col:'#888',sz:20});}
  });
  projectiles=projectiles.filter(p=>p.t<1.5);
  fxTexts.forEach(f=>f.t++);fxTexts=fxTexts.filter(f=>f.t<f.dur);
}
function drawUsagi(){
  let src;
  if(phase==='squat'||phase==='game'){src=OC.toilet;}
  else if(phase==='explode'){src=OC.crazy;}
  else{src=OC.worker;}
  const dx=0;
  if(!src)return;
  const sc=UW/src.width,dw=src.width*sc,dh=src.height*sc;
  ctx.drawImage(src,UX-dw/2+dx,UY-dh/2,dw,dh);
}
function drawTarget(){
  const r=TR; // 圆形头像半径
  const sk=Math.round(colShake*(Math.random()>.5?1:-1));
  const sky=Math.round(colShake*(Math.random()>.5?.35:-.35));
  ctx.save(); ctx.translate(TX+sk, TY+sky);
  // 外圈光晕
  ctx.shadowColor=charProg>0?`rgba(255,${Math.floor(80-charProg*70)},0,.8)`:'rgba(200,100,180,.35)';
  ctx.shadowBlur=14+charProg*22;
  // 白圈边框
  ctx.beginPath(); ctx.arc(0,0,r+6,0,Math.PI*2);
  ctx.fillStyle=charProg>.3?`rgb(${Math.floor(60+charProg*70)},${Math.floor(15-charProg*12)},0)`:'#fff';
  ctx.fill(); ctx.shadowBlur=0;
  // 彩色外圈
  ctx.beginPath(); ctx.arc(0,0,r+3,0,Math.PI*2);
  ctx.strokeStyle='rgba(200,140,220,.5)'; ctx.lineWidth=3; ctx.stroke();
  // 圆形头像
  ctx.save();
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
  if(colleagueImg&&colleagueImg.complete&&colleagueImg.naturalWidth){
    ctx.drawImage(colleagueImg,-r,-r,r*2,r*2);
  } else {
    ctx.fillStyle='#f0e8f8'; ctx.fillRect(-r,-r,r*2,r*2);
    ctx.font=`${r}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('😤',0,0);
  }
  // 炸糊效果
  if(charProg>0){
    ctx.globalAlpha=Math.min(charProg*1.15,.92); ctx.fillStyle='#1a0400'; ctx.fillRect(-r,-r,r*2,r*2);
    if(charProg<.7){
      ctx.globalAlpha=(1-charProg/.7)*.6;
      const g=ctx.createRadialGradient(0,0,0,0,0,r*1.15);
      g.addColorStop(0,'rgba(255,130,0,.9)'); g.addColorStop(1,'rgba(220,0,0,0)');
      ctx.fillStyle=g; ctx.fillRect(-r*1.3,-r*1.3,r*2.6,r*2.6);
    }
  }
  ctx.restore(); ctx.restore();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  const grd=ctx.createLinearGradient(0,0,W,H);grd.addColorStop(0,'#FFF5FA');grd.addColorStop(1,'#F5F0FF');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);
  drawTarget();drawUsagi();
  if(poopVisible&&OC.poop){
    const bx=W*.48,by=H*.56+Math.sin(tick*.12)*7,rot=Math.sin(tick*.08)*.14;
    ctx.save();ctx.translate(bx,by);ctx.rotate(rot);
    const pw=120,ph=OC.poop.height/OC.poop.width*120;
    ctx.drawImage(OC.poop,-pw/2,-ph/2,pw,ph);ctx.restore();
    ctx.save();ctx.strokeStyle=`rgba(232,120,154,${.4+Math.sin(tick*.08)*.3})`;
    ctx.lineWidth=2;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.arc(bx,by,82,0,Math.PI*2);ctx.stroke();ctx.restore();
    if(tick%18<9){ctx.save();ctx.font='bold 12px PingFang SC,sans-serif';
      ctx.textAlign='center';ctx.fillStyle='#E8789A';ctx.fillText('👆 点我！',bx,by+100);ctx.restore();}
  }
  projectiles.forEach(p=>{
    if(p.done)return;
    const tt=Math.min(p.t,1),px=bz(p.sx,p.cpX,p.tx,tt),py=bz(p.sy,p.cpY,p.ty,tt);
    ctx.save();ctx.translate(px,py);ctx.rotate(p.rot);
    if(OC.poop){const s=56,ph2=OC.poop.height/OC.poop.width*s;ctx.drawImage(OC.poop,-s/2,-ph2/2,s,ph2);}
    ctx.restore();
  });
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);ctx.translate(p.x,p.y);ctx.rotate(p.rot);
    if(p.emoji){ctx.font=`${p.sz}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(p.emoji,0,0);}
    else{ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(0,0,p.sz/3,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  fxTexts.forEach(f=>{
    const pg=f.t/f.dur;ctx.save();ctx.globalAlpha=Math.max(0,1-pg*1.1);
    const sc=f.bold?1+(1-pg)*.4:1;ctx.translate(f.x,f.y-pg*40);ctx.scale(sc,sc);
    ctx.font=`${f.bold?'bold ':''}${f.sz}px PingFang SC,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    if(f.bold){ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=3;ctx.strokeText(f.text,0,0);}
    ctx.fillStyle=f.col;ctx.fillText(f.text,0,0);ctx.restore();
  });

}

// 海报条纹
function pStripe(ctx, x, y, w, h) {
  const S = 18;
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  for (let i = x - h; i < x + w + h; i += S) {
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.moveTo(i, y); ctx.lineTo(i+S/2, y);
    ctx.lineTo(i+S/2+h, y+h); ctx.lineTo(i+h, y+h);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.moveTo(i+S/2, y); ctx.lineTo(i+S, y);
    ctx.lineTo(i+S+h, y+h); ctx.lineTo(i+S/2+h, y+h);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}

// 圆角矩形
function pRR(ctx, x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=2;ctx.stroke();}
}

// 自动换行文字
function pText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(''); // 中文按字符
  let line = '', lines = [];
  for(const ch of words) {
    const test = line + ch;
    if(ctx.measureText(test).width > maxW && line !== '') {
      lines.push(line); line = ch;
    } else { line = test; }
  }
  if(line) lines.push(line);
  lines.forEach((l, i) => ctx.fillText(l, x, y + i * lineH));
  return lines.length;
}

async function generatePoster() {
  const PW = 500, PH = 860;
  const oc = document.createElement('canvas');
  oc.width = PW; oc.height = PH;
  const ctx = oc.getContext('2d');

  // 背景
  const bg = ctx.createLinearGradient(0, 0, PW, PH);
  bg.addColorStop(0, '#EDE8FF'); bg.addColorStop(1, '#FFE8F4');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, PW, PH);

  // 顶部警示条
  pStripe(ctx, 0, 0, PW, 26);

  // App 标题
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold 26px PingFang SC, sans-serif';
  ctx.fillStyle = '#4A3848';
  ctx.fillText('💩 乌萨奇伪人制裁系统', PW/2, 56);
  ctx.font = '15px PingFang SC, sans-serif';
  ctx.fillStyle = '#9A80B8';
  ctx.fillText('优雅，永不过时。发疯，随时待命。', PW/2, 82);

  // 白卡
  ctx.shadowColor = 'rgba(100,60,200,.12)'; ctx.shadowBlur = 18;
  pRR(ctx, 20, 100, PW-40, 600, 20, '#fff', null);
  ctx.shadowBlur = 0;

  // 称号
  ctx.font = 'bold 22px PingFang SC, sans-serif';
  ctx.fillStyle = '#2A1A4A'; ctx.textAlign = 'center';
  const rankEl = document.getElementById('rpt-rank');
  const rank = rankEl ? rankEl.textContent : '【称号】';
  ctx.fillText(rank, PW/2, 144);

  // 类型标签
  const tagEl = document.getElementById('rpt-tag');
  const tag = tagEl ? tagEl.textContent : 'USAGI';
  const tagColor = tagEl ? tagEl.style.background : '#888';
  const tagW = ctx.measureText(tag).width + 32;
  pRR(ctx, PW/2 - tagW/2, 158, tagW, 30, 15, tagColor, null);
  ctx.font = 'bold 14px PingFang SC, sans-serif';
  ctx.fillStyle = '#fff'; ctx.fillText(tag, PW/2, 173);

  // 角色大图
  const cardImg = document.getElementById('rpt-card-img');
  if(cardImg && cardImg.naturalWidth) {
    const iSize = 180;
    pRR(ctx, PW/2-iSize/2-4, 198, iSize+8, iSize+8, 18, '#f5f0ff', null);
    ctx.save();
    ctx.beginPath(); ctx.roundRect(PW/2-iSize/2, 202, iSize, iSize, 14); ctx.clip();
    ctx.drawImage(cardImg, PW/2-iSize/2, 202, iSize, iSize);
    ctx.restore();
    // 稀有度角标
    const badgeEl = document.getElementById('rpt-rarity-badge');
    const rarity = badgeEl ? badgeEl.textContent : 'SR';
    const badgeColors = {UR:'#FF9500',SSR:'#9B3DFF',SR:'#2979FF',R:'#888'};
    const bc = badgeColors[rarity]||'#888';
    pRR(ctx, PW/2+iSize/2-38, 192, 46, 24, 12, bc, null);
    ctx.font = 'bold 13px PingFang SC, sans-serif';
    ctx.fillStyle = '#fff'; ctx.fillText(rarity, PW/2+iSize/2-15, 204);
  }

  // 金句
  const quoteEl = document.getElementById('rpt-quote');
  const quote = quoteEl ? quoteEl.textContent : '';
  pRR(ctx, 34, 394, PW-68, 70, 10, '#F5F0FF', null);
  ctx.font = '14px PingFang SC, sans-serif';
  ctx.fillStyle = '#5A3868'; ctx.textAlign = 'left';
  pText(ctx, '"' + quote + '"', 50, 415, PW-100, 22);

  // 数据条
  const stats = [
    {label:'净化值', val: document.getElementById('rpt-purity-val')?.textContent||'99.9%', w:1},
    {label:'消耗便便', val:'15 枚', w:1},
    {label:'怒气值', val: (document.getElementById('rpt-rage-val')?.textContent||'---')+'%', w:0.6},
  ];
  let sy = 480;
  ctx.font = '13px PingFang SC, sans-serif';
  stats.forEach(s => {
    ctx.fillStyle = '#8A7898'; ctx.textAlign = 'left';
    ctx.fillText(s.label, 36, sy);
    pRR(ctx, 100, sy-11, 290, 12, 6, '#EDE0F0', null);
    const grd = ctx.createLinearGradient(100, 0, 100+290*s.w, 0);
    grd.addColorStop(0,'#B8EFE4'); grd.addColorStop(1,'#E8789A');
    pRR(ctx, 100, sy-11, 290*s.w, 12, 6, grd, null);
    ctx.fillStyle = '#4A3848'; ctx.textAlign = 'right';
    ctx.fillText(s.val, 460, sy);
    sy += 30;
  });

  // 指标 pill
  const timeEl = document.getElementById('rpt-time');
  const rageEl = document.getElementById('rpt-rage-pill');
  const rarityEl = document.getElementById('rpt-rarity-text');
  const pillText = `${rarityEl?.textContent||'SR'} · 耗时 ${timeEl?.textContent||'-.-'}s · 怒气 ${rageEl?.textContent||'---'}%`;
  ctx.font = 'bold 13px PingFang SC, sans-serif';
  ctx.textAlign = 'center';
  const pillW = Math.min(ctx.measureText(pillText).width + 40, PW-80);
  pRR(ctx, PW/2-pillW/2, 580, pillW, 28, 14, '#F0EEFF', null);
  ctx.fillStyle = '#7050B8'; ctx.fillText(pillText, PW/2, 594);

  // 分割线
  ctx.strokeStyle = 'rgba(200,160,220,.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(36, 624); ctx.lineTo(PW-36, 624); ctx.stroke();

  // QR 码区
  const qrSize = 110;
  ctx.font = 'bold 14px PingFang SC, sans-serif';
  ctx.fillStyle = '#4A3848'; ctx.textAlign = 'left';
  ctx.fillText('扫码测你的精神状态', 36, 650);
  ctx.font = '11px PingFang SC, sans-serif';
  ctx.fillStyle = '#9A80B8';
  ctx.fillText(SHARE_URL, 36, 670);

  // 加载 QR 图片
  await new Promise(res => {
    const qrImg = new Image();
    qrImg.crossOrigin = 'anonymous';
    qrImg.onload = () => {
      pRR(ctx, PW-qrSize-28, 630, qrSize+8, qrSize+8, 10, '#fff', '#E0D0F0');
      ctx.drawImage(qrImg, PW-qrSize-24, 634, qrSize, qrSize);
      res();
    };
    qrImg.onerror = res; // 失败就跳过
    qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size='+qrSize+'x'+qrSize+'&data='+encodeURIComponent(SHARE_URL)+'&color=4A3848';
  });

  // 底部警示条
  pStripe(ctx, 0, PH-26, PW, 26);

  return oc;
}

async function shareRpt() {
  const rank = document.getElementById('rpt-rank')?.textContent || '伪人制裁报告';
  const rarity = document.getElementById('rpt-rarity-badge')?.textContent || 'SR';
  const time = document.getElementById('rpt-time')?.textContent || '-.-';

  // 生成海报
  let posterCanvas;
  try { posterCanvas = await generatePoster(); } catch(e) {}

  if(posterCanvas) {
    posterCanvas.toBlob(async blob => {
      const file = new File([blob], '伪人制裁报告.png', {type:'image/png'});
      // 尝试原生分享（含图片）
      if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
        try {
          await navigator.share({files:[file], title:'精神状态确诊报告',
            text:`[${rarity}] ${rank}\n耗时${time}秒！来测测你的职场战斗力！`});
          return;
        } catch(e){}
      }
      // 降级：下载海报
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '伪人制裁报告.png';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }, 'image/png');
  } else {
    // 无 canvas：文字分享或提示
    if(navigator.share) {
      navigator.share({title:'精神状态确诊报告',
        text:`[${rarity}] ${rank}\n耗时${time}秒！`}).catch(()=>{});
    } else {
      alert('📸 截图发给朋友！\n['+rarity+'] '+rank);
    }
  }
}

}
